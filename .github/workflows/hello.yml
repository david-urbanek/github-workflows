name: 'Hello World'
on:
  push:
    branches: [main]
jobs:
  say-hello:
    runs-on: ubuntu-latest
    steps:
      - name: 'Say Hello'
        run: echo "Hello, World!"
      - name: 'Run date'
        run: date
      - name: 'Run ls -l'
        run: ls -l
  simple_deployment_pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm install
      - name: Check style
        run: npm run eslint
